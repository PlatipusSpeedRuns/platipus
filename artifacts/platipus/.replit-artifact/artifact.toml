kind = "web"
previewPath = "/"
title = "Platipus - Open Source Speedrun Leaderboards"
version = "1.0.0"
id = "artifacts/platipus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21206

[services.development]
run = "pnpm --filter @workspace/platipus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/platipus", "run", "build" ]
publicDir = "artifacts/platipus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21206"
BASE_PATH = "/"
